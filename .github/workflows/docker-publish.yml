name: Build and push Docker image

# - Pushes to `main` publish `neoqiss/unicorn:latest`
# - Version tags (v1.2.3) publish `neoqiss/unicorn:1.2.3`, `:1.2`, `:1`, and
#   also update `:latest` (docker/metadata-action's default semver
#   behavior - a tagged release is "more latest" than main)
#
# Requires two repository secrets (Settings -> Secrets and variables ->
# Actions): DOCKERHUB_USERNAME and DOCKERHUB_TOKEN (a Docker Hub access
# token, not your account password - create one under Docker Hub ->
# Account Settings -> Security -> New Access Token).
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch: {}

env:
  IMAGE_NAME: neoqiss/unicorn

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Prevents two pushes to main in quick succession from racing each
    # other's image push - each run waits for the previous one to finish.
    concurrency:
      group: docker-publish
      cancel-in-progress: false

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Turns the git ref that triggered this run into the right set of
      # Docker tags. `type=semver` entries auto-tag `latest` on a version
      # tag push (metadata-action's default `flavor: latest=auto`
      # behavior) - the explicit `type=raw` rule below covers the other
      # half of the requirement: also tagging `latest` on a plain push to
      # main, which semver alone won't do since main isn't a version tag.
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          # linux/amd64 only - matches the AWS Lightsail Ubuntu VPS this
          # image is deployed to. Add linux/arm64 here (and a
          # docker/setup-qemu-action step above) only if a second
          # architecture is actually needed later.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions' own cache backend for Buildx layers - keeps
          # cargo-chef's cached dependency layer (see Dockerfile) warm
          # across workflow runs, not just within a single run.
          cache-from: type=gha
          cache-to: type=gha,mode=max
